name: Deploy to safety.kineticgain.com

# .NET 8 prerender → site/ → Hostinger FTP at /safety/
# Replaces GitHub Pages (pages.yml.disabled). Same FTP_SERVER/FTP_USERNAME/FTP_PASSWORD secrets.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'docs/**'
      - 'screenshots/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pharmacovigilance-signal-router
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build + FTP-sync to safety.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore pharmacovigilance-signal-router.sln

      - name: Prerender
        run: dotnet run --project src/PharmacovigilanceSignalRouter.Api -- --prerender

      - name: Verify build output
        run: |
          test -d site || (echo "FAIL: site/ missing after prerender" && exit 1)
          test -f site/index.html || (echo "FAIL: site/index.html missing" && exit 1)
          ls -lah site | head -10

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/
          server-dir: /safety/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
